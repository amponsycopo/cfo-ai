<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFO.ai – Masuk atau Daftar</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #0D0F0E;
    --surface: #141714;
    --surface2: #1C1F1C;
    --surface3: #232623;
    --ink: #F0EDE6;
    --ink2: #8A9088;
    --ink3: #4A504A;
    --accent: #A8D5A2;
    --accent2: #6BBF65;
    --accent-dark: #2D5C2A;
    --warn: #E8845A;
    --warn-dark: #5C2D14;
    --border: #1E221E;
    --border2: #252925;
    --radius: 18px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* NOISE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* GLOW BG */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(107,191,101,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .page {
    width: 100%; max-width: 440px;
    padding: 24px;
    position: relative; z-index: 1;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* LOGO */
  .logo {
    display: flex; align-items: center; gap: 10px;
    justify-content: center;
    margin-bottom: 40px;
  }

  .logo-dot {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 20px;
    color: var(--ink); letter-spacing: -0.3px;
  }

  .logo-name span { color: var(--accent2); }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    overflow: hidden;
  }

  /* CARD HEADER */
  .card-header {
    padding: 20px 32px 0;
    border-bottom: 1px solid var(--border2);
    padding-bottom: 0;
  }

  /* FORM BODY */
  .form-body {
    padding: 32px;
  }

  .form-title {
    font-family: 'Instrument Serif', serif;
    font-size: 26px; letter-spacing: -0.5px;
    color: var(--ink); margin-bottom: 6px;
  }

  .form-sub {
    font-size: 13px; color: var(--ink2);
    margin-bottom: 28px; line-height: 1.5;
  }

  .field { margin-bottom: 14px; }

  .field-label {
    font-size: 11px; font-weight: 700;
    color: var(--ink3); letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 7px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    font-size: 14px; color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .field-input:focus { border-color: var(--accent2); }
  .field-input::placeholder { color: var(--ink3); }
  .field-input.error { border-color: var(--warn); }

  .btn-submit {
    width: 100%; padding: 15px;
    background: var(--accent2);
    color: #0D1A0D;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
    margin-top: 20px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .btn-submit:hover { background: var(--accent); transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* SPINNER */
  .spin {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(13,26,13,0.3);
    border-top-color: #0D1A0D;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ALERT */
  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px; line-height: 1.5;
    margin-bottom: 16px;
    display: none;
  }

  .alert.show { display: block; }
  .alert.error { background: rgba(232,132,90,0.1); border: 1px solid var(--warn-dark); color: var(--warn); }
  .alert.success { background: rgba(107,191,101,0.1); border: 1px solid var(--accent-dark); color: var(--accent2); }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border2); }
  .divider-text { font-size: 11px; color: var(--ink3); }

  /* FEATURES */
  .features {
    margin-top: 32px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .feature {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--ink3);
  }

  .feature-dot {
    width: 20px; height: 20px; border-radius: 6px;
    background: rgba(107,191,101,0.1);
    border: 1px solid var(--accent-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0;
  }

  /* FORGOT PW */
  .forgot-link {
    font-size: 11px; color: var(--ink3);
    text-decoration: underline; cursor: pointer;
    background: none; border: none;
    font-family: 'DM Sans', sans-serif;
    display: block; text-align: right; margin-top: 6px;
    transition: color 0.2s;
  }

  .forgot-link:hover { color: var(--ink2); }



  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
</style>
</head>
<body>

<div class="page">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-dot">💼</div>
    <div class="logo-name">CFO<span>.ai</span></div>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- FORM BODY -->
    <div class="form-body">
      <div class="form-title">Selamat datang</div>
      <div class="form-sub">Masuk ke akun CFO.ai Anda</div>

      <div class="alert" id="alert-masuk"></div>

      <div class="field">
        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="masuk-email" placeholder="nama@email.com" />
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="masuk-password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') doLogin()" />
        <button class="forgot-link" onclick="doForgotPassword()">Lupa password?</button>
      </div>

      <button class="btn-submit" id="btn-masuk" onclick="doLogin()">
        <span>Masuk →</span>
      </button>

    </div>
  </div>

</div>

<script>
// ── Config ──────────────────────────────────────────────
const SUPABASE_URL = 'https://pqpvtlfhewutpjwqdyqt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcHZ0bGZoZXd1dHBqd3FkeXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTM4MzcsImV4cCI6MjA4ODQ4OTgzN30.cW9U7vgHV7OqJ0h3NXkiXgcos25-7y0246LDpjTITK4';
// ────────────────────────────────────────────────────────

let _supabaseClient;
try {
  _supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  console.error('Supabase init failed:', e);
}

// Kalau sudah login → langsung ke dashboard
async function checkExistingSession() {
  if (!_supabaseClient) return;
  try {
    const { data: { session } } = await _supabaseClient.auth.getSession();
    if (session) {
      window.location.href = 'dashboard.html';
    }
  } catch(e) {
    console.warn('Session check failed:', e.message);
  }
}
checkExistingSession();

// ── Tab Switch ──────────────────────────────────────────
// (removed - login only mode)


// ── Alerts ──────────────────────────────────────────────
function showAlert(panel, msg, type = 'error') {
  const el = document.getElementById('alert-' + panel);
  el.textContent = msg;
  el.className = 'alert show ' + type;
}

function hideAlert(panel) {
  document.getElementById('alert-' + panel).className = 'alert';
}

function setLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<div class="spin"></div><span>Memproses...</span>'
    : `<span>${label}</span>`;
}

// ── Login ───────────────────────────────────────────────
async function doLogin() {
  if (!_supabaseClient) {
    showAlert('masuk', 'Koneksi gagal. Refresh halaman dan coba lagi.');
    return;
  }
  const email    = document.getElementById('masuk-email').value.trim();
  const password = document.getElementById('masuk-password').value;

  if (!email || !password) {
    showAlert('masuk', 'Email dan password wajib diisi.');
    return;
  }

  hideAlert('masuk');
  setLoading('btn-masuk', true, 'Masuk →');

  try {
    const { data, error } = await _supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;
    window.location.href = 'dashboard.html';
  } catch(e) {
    const msg = e.message.includes('Invalid login') 
      ? 'Email atau password salah.' 
      : e.message.includes('Email not confirmed')
      ? 'Cek email Anda untuk konfirmasi akun terlebih dahulu.'
      : 'Gagal masuk: ' + e.message;
    showAlert('masuk', msg);
    setLoading('btn-masuk', false, 'Masuk →');
  }
}

// ── Forgot Password ─────────────────────────────────────
async function doForgotPassword() {
  const email = document.getElementById('masuk-email').value.trim();
  if (!email) {
    showAlert('masuk', 'Masukkan email Anda dulu, lalu klik "Lupa password?"');
    return;
  }
  try {
    await _supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/dashboard.html'
    });
    showAlert('masuk', '✅ Link reset password telah dikirim ke ' + email, 'success');
  } catch(e) {
    showAlert('masuk', 'Gagal kirim reset: ' + e.message);
  }
}
</script>
</body>
</html>
